site_name: GaugeBench Docs
site_description: Documentation for GaugeBench — build, run, and deploy expert AI agents against private context under an enforced boundary.
site_url: https://docs.gaugewright.com/
copyright: © 2026 GaugeWright LLC

docs_dir: docs
site_dir: site

theme:
  name: material
  font:
    text: Figtree
    code: Inconsolata
  palette:
    # Navy-led by default (matches the marketing site); light is a toggle.
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/jamesjscully/gaugebench
repo_name: jamesjscully/gaugebench
edit_uri: edit/main/docs/

extra_css:
  - assets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
      - concepts/index.md
      - Glossary: concepts/glossary.md
      - How GaugeWright protects your work: concepts/protection.md
      - Deployment modes: concepts/deployment-modes.md
  - Guides:
      - For experts (consultants):
          - guides/expert/index.md
          - Build an agent: guides/expert/build-an-agent.md
          - Run & review work: guides/expert/run-and-review.md
          - Versioning, freezing & forking: guides/expert/versioning-and-forking.md
          - Package & deploy: guides/expert/package-and-deploy.md
          - Troubleshooting: guides/expert/troubleshooting.md
      - For clients:
          - guides/client/index.md
          - Review & release outputs: guides/client/review-and-release.md
          - Verify before you trust: guides/client/verify-before-trust.md
      - For admins (IT):
          - guides/admin/index.md
          - Identity & provisioning (SSO, SCIM): guides/admin/identity-and-provisioning.md
      - For embedded end-users:
          - guides/embed/index.md
  - Security &amp; trust:
      - security.md
      - Subprocessors &amp; data processing: trust/subprocessors.md
      - Support &amp; response targets: trust/support.md
      - Security operations &amp; hardening: trust/security-operations.md
      - Incident-response runbook: trust/incident-response.md
  - Reference:
      - Roadmap &amp; status: reference/status.md
      - Known limitations & gaps: reference/limitations.md
      - Verifying the security claims: reference/verifying-claims.md
  - FAQ: faq.md
