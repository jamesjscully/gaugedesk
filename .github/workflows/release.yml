# UNSIGNED packaging lane (D-RELEASE-LANES item 2, Band 1). On tag push the per-OS
# Tauri build matrix produces **unsigned** installable bundles — .deb + .AppImage on
# Linux, .dmg on macOS, .msi on Windows — and uploads them as workflow artifacts for
# dogfooding. Signing / notarization stay clearly-commented placeholders (they need
# certs/keys this repo does not hold — Band 3). See DEFERRED.md (D-RELEASE-LANES) and
# specs/implementation/test-and-release-infra.md (Tier 4 "packaging & self-contained
# distribution" + the Release lane in "CI lane structure").
#
# VALIDATED-BY-SYNTAX-HERE, RUNS-ON-CI: this environment has no webkit/Tauri
# toolchain, so a Tauri build canNOT run locally. This file is validated only by YAML
# syntax here (python3 -c "import yaml; yaml.safe_load(...)"); the actual bundle build
# runs on GitHub's per-OS runners. The web build (web/) runs first because the bundle
# embeds web/dist (frontendDist: ../web/dist).
#
# Tier-4 self-contained runtime (SELFHOST-1):
#   * WhippleScript is linked into the Rust control plane. Pi and its membrane
#     plugin are not production dependencies and are not bundled.
#   * The versioned workspace is WhippleScript-native; bundles do not require a
#     system or vendored Git executable.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "tag or ref to build"
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release + upload bundle assets

jobs:
  bundle:
    name: tauri bundle (${{ matrix.os-label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux -> .deb + .AppImage (unsigned)
          - os-label: linux
            runner: ubuntu-latest
            bundles: deb,appimage
          # macOS (Apple Silicon) -> .app.tar.gz (updater) + .dmg (download).
          # The `app` target is REQUIRED for the self-update artifact: the updater
          # bundle is a tar.gz of the .app, and `dmg` alone produces no .app.tar.gz,
          # so v0.1.0's latest.json had no darwin-aarch64 entry. (unsigned — no notarization)
          - os-label: macos
            runner: macos-latest
            bundles: app,dmg
          # Windows -> .msi (unsigned — no Authenticode)
          - os-label: windows
            runner: windows-latest
            bundles: msi
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: linux bundle deps
        # NEEDS-INFRA: Tauri's Linux bundling needs gtk/webkit2gtk + appindicator.
        if: matrix.os-label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      # -----------------------------------------------------------------------
      # SIGNING STATUS:
      #   * Tauri UPDATER artifacts ARE signed (env block below) — the keypair was
      #     generated with `tauri signer generate`; the public key lives in
      #     tauri.conf.json (plugins.updater.pubkey) and the private key + password
      #     are the repo secrets TAURI_SIGNING_PRIVATE_KEY / *_PASSWORD. This signs
      #     the update payload (latest.json + the per-OS update bundles), so the
      #     installed app can verify and self-update.
      #   * OS-level code signing / notarization is STILL UNSIGNED — those need
      #     certs this repo does not hold (Band 3). Uncomment per-OS and wire the
      #     named secrets when a signing identity exists:
      #       macOS:   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD /
      #                APPLE_SIGNING_IDENTITY (Developer ID cert, for codesign) +
      #                APPLE_API_ISSUER / APPLE_API_KEY / APPLE_API_KEY_PATH
      #                (App Store Connect API key, for notarization — no 2FA at build)
      #       Windows: WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD
      # -----------------------------------------------------------------------

      - name: pin bundle version to the release tag
        # Single source of version truth = the git tag. On a tag push, rewrite the
        # tauri.conf.json version to the tag (`vX.Y.Z` -> `X.Y.Z`) so the bundle names
        # (.dmg/.msi/.deb/.AppImage) AND the updater latest.json version equal the
        # release tag, never the hard-coded in-repo dev default (Tauri reads the bundle
        # version from here). Non-tag workflow_dispatch dry-runs keep the in-repo
        # default. jq ships on all three GitHub runner images.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Pinning bundle version to $VERSION (tag $GITHUB_REF_NAME)"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json
          echo "bundle version now: $(jq -r .version src-tauri/tauri.conf.json)"

      - name: tauri build (OS-unsigned, signed updater, ${{ matrix.bundles }})
        # Bundles are NOT OS-code-signed (no Apple/Windows certs); UPDATE artifacts
        # ARE signed via the TAURI_SIGNING_* env below. `--config tauri.bundle.conf.json`
        # (in args) merges the release-only overlay that enables
        # createUpdaterArtifacts. Runtime assets need no Pi/plugin resource bundle:
        # WhippleScript is linked into the control plane.
        uses: tauri-apps/tauri-action@v0
        env:
          # tauri-action creates the draft GitHub Release + uploads assets with this
          # (the permissions block alone doesn't inject it into the step env).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin frontend detection: the CLI otherwise globs for a package.json from
          # its own cwd (which on CI is the checkout root, not src-tauri), making
          # relative paths like beforeBuildCommand's `../web` resolve wrongly. The
          # overlay also nulls out beforeBuildCommand — the `build web bundle` step
          # above already produced web/dist, so the release build must not rebuild it.
          TAURI_FRONTEND_PATH: ${{ github.workspace }}/web
          # Tauri updater signing (matches plugins.updater.pubkey in tauri.conf.json):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # # ── macOS signing + notarization (Band 3 / D-RELEASE-LANES; still
          # #    GATED — this repo holds no Apple certs). ENABLE = add the secrets
          # #    below, then uncomment these lines. Notarization uses an App Store
          # #    Connect API key (.p8), NOT an Apple-ID app-specific password, so CI
          # #    needs no interactive 2FA at build time. Steps:
          # #      1. Enrol in the Apple Developer Program (needs 2FA on the account).
          # #      2. Create a "Developer ID Application" cert → export .p12 → base64
          # #         → secret APPLE_CERTIFICATE (+ APPLE_CERTIFICATE_PASSWORD); the
          # #         identity string ("Developer ID Application: Name (TEAMID)") →
          # #         APPLE_SIGNING_IDENTITY. These sign the .app/.dmg.
          # #      3. App Store Connect → Users and Access → Integrations → API key:
          # #         Issuer ID → APPLE_API_ISSUER, Key ID → APPLE_API_KEY, the .p8 →
          # #         APPLE_API_KEY_PATH (add a step to write the secret to a file).
          # #         These notarize the signed bundle.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          # # Windows Authenticode:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: src-tauri
          # Draft a single GitHub Release that all three matrix legs upload into.
          tagName: ${{ github.ref_name }}
          releaseName: "GaugeDesk ${{ github.ref_name }}"
          releaseDraft: true
          args: --bundles ${{ matrix.bundles }} --config tauri.bundle.conf.json

      - name: upload unsigned bundles (workflow artifact)
        # The unsigned .deb/.AppImage/.dmg/.msi for this OS, kept as a workflow
        # artifact for dogfooding (and so a dry-run via workflow_dispatch without a
        # tag still yields inspectable output). `error` so a build that produced no
        # bundle fails loudly rather than silently uploading nothing.
        uses: actions/upload-artifact@v4
        with:
          name: gaugedesk-bundles-${{ matrix.os-label }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: error
